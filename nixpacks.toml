# Tells Nixpacks (Railway's default builder) that this is a Node project
# whose package.json lives in /web rather than at the repo root.
#
# Why: Nixpacks auto-detection only looks at the repo root. Without this
# file it sees no package.json there and refuses to install Node. With
# this file we explicitly install nodejs_22 + openssl (Prisma needs it)
# and run the build steps inside /web.
#
# nodejs_22 (not 20) because Nixpacks' default nixpkgs snapshot ships
# nodejs_20 = 20.6.1, but Next.js 16 needs >=20.9.0 and Vite 8 needs
# >=20.19.0 || >=22.12.0. nodejs_22 from the same snapshot satisfies both.

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["cd web && npm ci"]

[phases.build]
cmds = [
  "cd web && npx prisma generate",
  "cd web && npm run build",
]

# Migrations run at startup, NOT during build — the Railway internal DNS
# (mysql.railway.internal) only resolves at runtime, so build-time
# attempts to reach the database fail with P1001. Running migrate deploy
# here means the migration history is checked against the live DB on
# every cold-start. It's idempotent: applied migrations are no-ops.
# Fail-fast — if migrate fails, start never runs and Railway marks the
# deploy unhealthy rather than silently shipping a schema-drift bug.
[start]
cmd = "cd web && npx prisma migrate deploy && npm run start"
